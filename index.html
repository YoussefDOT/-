<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة الزواج الإسلامي</title>
    <!-- Google Fonts for Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Symbols+Rounded" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

    <!-- Background Decoration -->
    <div class="background-noise"></div>
    <div class="gradient-bg"></div>

    <main class="app-container">
        <!-- Audio elements -->
        <audio id="audio-correct" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3" preload="auto"></audio>
        <audio id="audio-wrong" src="https://assets.mixkit.co/active_storage/sfx/2004/2004-preview.mp3" preload="auto"></audio>

        <!-- 1. Start Screen -->
        <section id="screen-start" class="screen active">
            <div class="card elevated center-content start-card">
                <div class="icon-container">
                    <span class="material-symbols-rounded huge-icon">menu_book</span>
                </div>
                <h1 class="display-title">لعبة الجواز حرفياً</h1>
                <p class="body-large muted-text" style="margin-bottom: 8px;">اختبار شامل في أحكام النكاح الإسلامي</p>
                
                <div class="player-setup">
                    <div class="avatar-upload">
                        <label for="player-photo" class="avatar-preview" id="avatar-preview-label">
                            <span class="material-symbols-rounded huge-icon" style="font-size: 36px;">add_a_photo</span>
                        </label>
                        <input type="file" id="player-photo" accept="image/*" class="hidden">
                    </div>
                    <input type="text" id="player-name" class="name-input" placeholder="أدخل اسمك الكريم" required autocomplete="off">
                </div>

                <button id="btn-start" class="btn btn-primary btn-large">
                    <span class="material-symbols-rounded">play_arrow</span>
                    ابدأ اللعب
                </button>
            </div>
        </section>

        <!-- 2. Subject Splash Screen -->
        <section id="screen-splash" class="screen">
            <div class="splash-container">
                <span class="material-symbols-rounded splash-icon">auto_awesome</span>
                <h2 id="splash-title" class="display-medium splash-title">الموضوع الأول</h2>
                <div class="progress-indicator"></div>
            </div>
        </section>

        <!-- 3. Quiz / Question Screen -->
        <section id="screen-quiz" class="screen">
            <header class="quiz-header">
                <div>
                    <h3 id="quiz-subject-title" class="title-medium">الباب الأول</h3>
                    <div class="score-pill">
                        <span class="material-symbols-rounded">stars</span>
                        <span id="score-display">0</span> / 50
                    </div>
                </div>
                <div class="progress-bar-container">
                    <div id="progress-bar" class="progress-bar"></div>
                </div>
                <div class="question-counter">السؤال <span id="current-q-num">1</span> من <span id="total-q-num">50</span></div>
            </header>

            <div class="card quiz-card">
                <h2 id="question-text" class="headline-medium question-text">نص السؤال...</h2>
                <div id="options-container" class="options-container">
                    <!-- Options injected here via JS -->
                </div>
                
                <!-- Explanation area (hidden until answered) -->
                <div id="explanation-container" class="explanation-container hidden">
                    <div class="explanation-content">
                        <span class="material-symbols-rounded info-icon">info</span>
                        <p id="explanation-text" class="body-medium">نص التعليل...</p>
                    </div>
                </div>
            </div>

            <footer class="quiz-footer">
                <button id="btn-prev" class="btn btn-secondary" disabled>
                    <span class="material-symbols-rounded">arrow_forward</span>
                    السابق
                </button>
                <div class="spacer"></div>
                <button id="btn-skip" class="btn" style="margin-left: 12px; border: 2px solid var(--md-sys-color-surface-variant); background: transparent; color: var(--md-sys-color-on-surface);">
                    تخطي
                    <span class="material-symbols-rounded">fast_forward</span>
                </button>
                <button id="btn-next" class="btn btn-primary hidden">
                    التالي
                    <span class="material-symbols-rounded">arrow_back</span>
                </button>
            </footer>
        </section>

        <!-- 4. Result / End Screen -->
        <section id="screen-result" class="screen">
            <div class="card elevated center-content result-card">
                <div class="result-profile">
                    <img id="result-avatar" src="" alt="صورة اللاعب" class="hidden result-avatar-img">
                    <div id="result-avatar-fallback" class="icon-container success-icon">
                        <span class="material-symbols-rounded huge-icon">workspace_premium</span>
                    </div>
                    <h2 id="result-player-name" class="display-title" style="margin-top: 8px; font-size: 32px;"></h2>
                </div>
                
                <h1 class="headline-medium">اكتمل الاختبار!</h1>
                <p class="body-large muted-text">نتيجتك النهائية هي:</p>
                <div class="final-score-circle">
                    <span id="final-score">0</span>
                    <span class="score-total">/ 50</span>
                </div>
                <p id="result-message" class="body-large muted-text">أحسنت صنعاً!</p>
                <button id="btn-restart" class="btn btn-primary btn-large">
                    <span class="material-symbols-rounded">refresh</span>
                    العب مرة أخرى
                </button>
            </div>
        </section>

    </main>

    <script src="questions.js"></script>
    <script src="script.js"></script>
</body>
</html>
